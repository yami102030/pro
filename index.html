<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- 外部排班引擎 -->

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react,react-dom",
            "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
        }
    }
    </script>
    <style type="text/tailwindcss">
        body { 
            background-color: #f8fafc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent;
        }
        
        /* 表格通用樣式 */
        .schedule-table th { @apply px-3 py-4 bg-slate-200/80 text-slate-800 text-xs md:text-sm font-black uppercase tracking-wider text-center border-b-2 border-slate-300; }
        .schedule-table td { @apply px-3 py-2.5 text-xs md:text-sm text-slate-700 border-b border-slate-200 vertical-top transition-all duration-300; }
        
        /* 同工標籤樣式 */
        .name-tag { 
            @apply inline-flex items-center justify-center px-1.5 py-0.5 text-[15px] font-bold text-slate-700 cursor-pointer select-none transition-all whitespace-nowrap rounded-md;
        }
        .name-tag:hover { @apply text-indigo-600 bg-indigo-50/50; }
        .name-tag.active { @apply text-indigo-700 bg-indigo-100 scale-105 z-10 shadow-sm border border-indigo-200; }
        .name-tag.dragging { @apply opacity-30; }
        .name-tag.empty-slot { @apply text-red-500 font-black animate-pulse; }
        .name-tag.conflict { @apply text-rose-600 font-black !important; }
        .name-tag.orphan { @apply text-sky-600 font-black !important; }

        /* 動畫效果 */
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        .animate-panel-right { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        
        .vertical-top { vertical-align: top; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .custom-scrollbar::-webkit-scrollbar, ::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track, ::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb, ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover, ::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }

        input, select, textarea { font-size: 16px !important; } 
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState, useEffect, useMemo, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Settings, Play, Save, CheckCircle2, AlertCircle, Users, ChevronRight, 
            LayoutList, RefreshCw, Trash2, Info, AlertTriangle, GripVertical, X, 
            UserCheck, Search, Clock, HandHeart, Calendar, Star, UserPlus, 
            ArrowRight, UserX, BarChart3, CalendarDays, Activity, TrendingUp, 
            Layers, ArrowUpDown, ArrowUp, ArrowDown, Download, ShieldAlert,
            HeartPulse, GitBranch, Lightbulb, UserCog, Database, ChevronLeft,
            Edit2, CalendarX, ShieldCheck, Pin, Ban, Heart, Copy, LogOut, Lock, User, MoreHorizontal, Check, ArrowLeftRight
        } from 'lucide-react';
        import { createClient } from '@supabase/supabase-js';

        // ==========================================
        // 系統常數與設定
        // ==========================================
        const SUPABASE_URL = "https://jcepavwocdujoeoqxvsd.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Tj2n8e3yY1HyvaFzXRyO_w_PWrVFB7E"; 
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const ADMIN_ACCOUNT = "tbcadmin"; 
        const VIRTUAL_DOMAIN = "@tbc.gmail.com";
        const sessionsToSchedule = ['第一堂', '第二堂'];

        const DEFAULT_MEMBER = {
            name: '', email: '', preferred_session: '第一堂', availability_status: '穩定服事',
            dual_service_pref: 0, group_id: '', unavailable_dates: [], newcomer_rule: '' 
        };
        const SESSION_OPTIONS = ['第一堂', '第二堂', '皆可'];
        const STATUS_OPTIONS = ['穩定服事', '暫停服事', '安息季', '一季一次'];

        // ==========================================
        // 無限制分頁抓取引擎 (fetchAllData)
        // 徹底解決 Supabase 1000 筆限制問題
        // ==========================================
        const fetchAllData = async (tableName, selectStr = '*', filterCallback = null) => {
            let allData = [];
            let rangeStart = 0;
            const pageSize = 1000;
            let hasMore = true;

            while (hasMore) {
                let query = supabase.from(tableName).select(selectStr).range(rangeStart, rangeStart + pageSize - 1);
                
                // 如果有額外的篩選邏輯
                if (filterCallback) {
                    query = filterCallback(query);
                }

                const { data, error } = await query;
                
                if (error) {
                    console.error(`Error fetching ${tableName}:`, error);
                    throw error;
                }

                if (data && data.length > 0) {
                    allData = [...allData, ...data];
                    rangeStart += pageSize;
                    // 如果拿回來的數量小於 pageSize，代表已經是最後一頁
                    if (data.length < pageSize) {
                        hasMore = false;
                    }
                } else {
                    hasMore = false;
                }
            }
            return allData;
        };

        // ==========================================
        // 共用工具函數
        // ==========================================
        const formatEmailForAuth = (acc) => {
            if (!acc) return '';
            const trimmed = acc.trim();
            return trimmed.includes('@') ? trimmed : `${trimmed}${VIRTUAL_DOMAIN}`;
        };
        const extractAccountFromEmail = (email) => {
            if (!email) return '';
            return email.endsWith(VIRTUAL_DOMAIN) ? email.replace(VIRTUAL_DOMAIN, '') : email;
        };

        const generateBaseQuarters = () => {
            const d = new Date();
            const currentYear = d.getFullYear();
            const currentQ = Math.floor(d.getMonth() / 3) + 1;
            const quarters = [];
            for (let offset = 0; offset <= 2; offset++) {
                let q = currentQ + offset;
                let y = currentYear;
                if (q > 4) { q -= 4; y += 1; }
                quarters.push(`${y}-Q${q}`);
            }
            return quarters;
        };

        const getNextQuarter = (qStr) => {
            let [y, q] = qStr.split('-Q').map(Number);
            if (q === 4) return `${y + 1}-Q1`;
            return `${y}-Q${q + 1}`;
        };

        const getCurrentQuarter = () => {
            const d = new Date();
            return `${d.getFullYear()}-Q${Math.floor(d.getMonth() / 3) + 1}`;
        };

        const getSundaysInQuarter = (quarterStr) => {
            if (!quarterStr) return [];
            const parts = quarterStr.split('-Q');
            if (parts.length !== 2) return [];
            const year = parseInt(parts[0], 10);
            const quarter = parseInt(parts[1], 10);
            const startMonth = (quarter - 1) * 3;
            const startDate = new Date(year, startMonth, 1);
            const endDate = new Date(year, startMonth + 3, 0);
            const sundays = [];
            for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                if (d.getDay() === 0) { 
                    const yyyy = d.getFullYear();
                    const mm = String(d.getMonth() + 1).padStart(2, '0');
                    const dd = String(d.getDate()).padStart(2, '0');
                    sundays.push(`${yyyy}-${mm}-${dd}`);
                }
            }
            return sundays;
        };

        const getHolidayName = (dateStr, customHolidaysMap = {}) => {
            if (customHolidaysMap && customHolidaysMap[dateStr]) return customHolidaysMap[dateStr];
            const [year, month, day] = dateStr.split('-');
            const md = `${month}-${day}`;
            const fixedHolidays = { '01-01': '元旦', '02-28': '和平紀念日', '04-04': '兒童節', '04-05': '清明節', '05-01': '勞動節', '08-08': '父親節', '10-10': '國慶日', '12-25': '聖誕節' };
            if (fixedHolidays[md]) return fixedHolidays[md];
            return null; 
        };

        // ==========================================
        // 登入元件 AuthScreen
        // ==========================================
        const AuthScreen = ({ supabase }) => {
            const [account, setAccount] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');

            const handleAuth = async (e) => {
                e.preventDefault();
                setLoading(true);
                setErrorMsg('');
                const loginEmail = formatEmailForAuth(account);
                try {
                    const { data, error } = await supabase.auth.signInWithPassword({ email: loginEmail, password });
                    if (error) throw error;
                    const loggedInEmail = data.user?.email;
                    const loggedInAccount = extractAccountFromEmail(loggedInEmail);
                    if (loggedInAccount !== ADMIN_ACCOUNT && loggedInEmail !== ADMIN_ACCOUNT) {
                        await supabase.auth.signOut();
                        throw new Error('僅限管理員登入');
                    }
                } catch (error) {
                    setErrorMsg(error.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                    <div className="bg-white max-w-md w-full rounded-[2rem] shadow-xl p-8 border border-slate-100 animate-fade-in">
                        <div className="flex flex-col items-center mb-8">
                            <div className="bg-indigo-600 p-4 rounded-2xl text-white shadow-md mb-4">
                                <Users size={32} />
                            </div>
                            <h1 className="text-2xl font-black text-slate-800 text-center leading-tight">TBC Serve Manager</h1>
                        </div>
                        <form onSubmit={handleAuth} className="space-y-5">
                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase ml-1">帳號</label>
                                <div className="relative mt-1">
                                    <User className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                    <input type="text" value={account} onChange={(e) => setAccount(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3.5 outline-none focus:border-indigo-500 font-semibold" placeholder="管理員帳號" required />
                                </div>
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase ml-1">密碼</label>
                                <div className="relative mt-1">
                                    <Lock className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                    <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3.5 outline-none focus:border-indigo-500 font-semibold" placeholder="●●●●●●" required />
                                </div>
                            </div>
                            {errorMsg && <p className="text-red-500 text-xs font-bold px-1">{errorMsg}</p>}
                            <button type="submit" disabled={loading} className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white font-black py-4 rounded-xl shadow-lg transition-all active:scale-95 text-lg">
                                {loading ? '處理中...' : '登入系統'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 模組一：同工資料中心 (MemberDataCenter)
        // ==========================================
        const MemberDataCenter = ({ session }) => {
            const isAdmin = true;
            const [viewQuarter, setViewQuarter] = useState(getCurrentQuarter());
            const [members, setMembers] = useState([]);
            const [positions, setPositions] = useState([]);
            const [memberPositions, setMemberPositions] = useState([]);
            const [quarterSettings, setQuarterSettings] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingMember, setEditingMember] = useState(null);
            const [formData, setFormData] = useState({ ...DEFAULT_MEMBER });
            const [formPositions, setFormPositions] = useState({});

            const loadData = async () => {
                setIsLoading(true);
                try {
                    // 使用 fetchAllData 取代原本的 select('*')
                    const [mData, pData, mpData, qsData, sysSettingsData] = await Promise.all([
                        fetchAllData('members', '*'),
                        fetchAllData('positions', '*'),
                        fetchAllData('member_positions', '*', (q) => q.eq('quarter', viewQuarter)),
                        fetchAllData('member_quarter_settings', '*', (q) => q.eq('quarter', viewQuarter)),
                        fetchAllData('member_quarter_settings', '*', (q) => q.eq('quarter', 'SYSTEM'))
                    ]);

                    setMembers(mData.sort((a,b) => a.name.localeCompare(b.name)));
                    setPositions(pData);
                    setMemberPositions(mpData);
                    setQuarterSettings(qsData);
                } catch (err) {
                    console.error("載入失敗", err);
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => { loadData(); }, [viewQuarter]);

            const displayMembers = useMemo(() => {
                return members.filter(m => m.name !== 'SYSTEM_CUSTOM_HOLIDAYS_DB' && m.name.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [members, searchTerm]);

            return (
                <div className="h-full flex flex-col bg-slate-50 animate-fade-in">
                    <div className="bg-white px-8 py-5 border-b border-slate-200 flex justify-between items-center shadow-sm z-20 shrink-0">
                        <h2 className="text-2xl font-black text-slate-900 flex items-center gap-3"><Users className="text-indigo-500" size={28}/> 同工資料管理</h2>
                        <div className="flex items-center gap-3">
                            <select value={viewQuarter} onChange={(e) => setViewQuarter(e.target.value)} className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 font-bold text-indigo-600 outline-none">
                                {generateBaseQuarters().map(q => <option key={q} value={q}>{q}</option>)}
                            </select>
                        </div>
                    </div>
                    
                    <div className="px-8 pt-6 shrink-0">
                        <div className="bg-white p-2 rounded-2xl shadow-sm border border-slate-200 flex items-center relative">
                            <Search className="absolute left-4 text-slate-400" size={20} />
                            <input type="text" placeholder="搜尋同工姓名..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full pl-11 pr-4 py-3 bg-transparent outline-none font-bold text-slate-700" />
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-8 pt-4 custom-scrollbar">
                        {isLoading ? (
                            <div className="text-center py-20 text-slate-400 font-bold animate-pulse">數據引擎載入中...</div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {displayMembers.map(m => (
                                    <div key={m.id} className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 hover:shadow-md transition-all">
                                        <h3 className="text-lg font-black text-slate-800">{m.name}</h3>
                                        <p className="text-xs font-bold text-slate-400 mt-1 uppercase tracking-wider">{m.group_id || '一般同工'}</p>
                                        <div className="mt-4 pt-4 border-t border-slate-50 flex justify-between items-center">
                                            <span className="text-[11px] font-black bg-indigo-50 text-indigo-600 px-2.5 py-1 rounded-lg">
                                                {quarterSettings.find(s => s.member_id === m.id)?.preferred_session || '未設定'}
                                            </span>
                                            <button className="text-slate-300 hover:text-indigo-500 transition-colors"><Edit2 size={16}/></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 模組二：排班作業 (Scheduling)
        // ==========================================
        const SchedulingCenter = () => {
            const [schedulingPhase, setSchedulingPhase] = useState('setup'); 
            const [year, setYear] = useState(new Date().getFullYear());
            const [quarter, setQuarter] = useState(Math.ceil((new Date().getMonth() + 1) / 3));
            const [generatedDraft, setGeneratedDraft] = useState([]);
            const [isLoading, setIsLoading] = useState(false);

            const runAutoSchedule = async () => {
                setIsLoading(true);
                try {
                    // 同步抓取所有歷史資料與設定
                    const currentQuarterStr = `${year}-Q${quarter}`;
                    const [members, positions, memberPositions, quarterSettings] = await Promise.all([
                        fetchAllData('members'),
                        fetchAllData('positions'),
                        fetchAllData('member_positions', '*', q => q.eq('quarter', currentQuarterStr)),
                        fetchAllData('member_quarter_settings', '*', q => q.eq('quarter', currentQuarterStr))
                    ]);

                    // 此處對接外部排班引擎
                    if (window.ScheduleEngine) {
                        const params = { year, quarter, effectiveMembers: members, effectiveMemberPositions: memberPositions, dbData: { positions } };
                        const draft = window.ScheduleEngine.generate(params);
                        setGeneratedDraft(draft);
                    }
                    setSchedulingPhase('editor');
                } catch (e) {
                    console.error("排班引擎啟動失敗", e);
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="h-full flex flex-col bg-slate-50 animate-fade-in">
                    {schedulingPhase === 'setup' ? (
                        <div className="flex-1 flex items-center justify-center p-6">
                            <div className="max-w-md w-full bg-white p-12 rounded-[3rem] shadow-sm border border-slate-200 text-center">
                                <div className="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6"><Calendar size={32} /></div>
                                <h2 className="text-3xl font-black text-slate-900 mb-8">季度排班作業</h2>
                                <div className="space-y-6">
                                    <div className="grid grid-cols-2 gap-4 text-left">
                                        <div>
                                            <label className="text-xs font-black text-slate-400 ml-1">年份</label>
                                            <input type="number" value={year} onChange={e => setYear(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 font-bold mt-1" />
                                        </div>
                                        <div>
                                            <label className="text-xs font-black text-slate-400 ml-1">季度</label>
                                            <select value={quarter} onChange={e => setQuarter(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 font-bold mt-1">
                                                {[1,2,3,4].map(q => <option key={q} value={q}>Q{q}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <button onClick={runAutoSchedule} disabled={isLoading} className="w-full bg-slate-900 hover:bg-black text-white font-black py-5 rounded-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center gap-3">
                                        {isLoading ? <RefreshCw className="animate-spin" /> : <><Play size={20} fill="currentColor"/> 啟動分頁抓取引擎並排班</>}
                                    </button>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="flex-1 p-8 overflow-y-auto">
                            <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm mb-6 flex justify-between items-center">
                                <h2 className="text-xl font-black text-slate-800">排班結果預覽 ({year}Q{quarter})</h2>
                                <button onClick={() => setSchedulingPhase('setup')} className="text-sm font-bold text-slate-400 hover:text-indigo-600">返回重新設定</button>
                            </div>
                            {/* 渲染排班表格 logic... */}
                            <p className="text-slate-400 font-bold text-center py-20">分頁抓取引擎已成功讀取全量歷史數據，請進行最後調整。</p>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // 主應用框架 (移除「數據洞察」導覽按鈕)
        // ==========================================
        const MainApp = ({ session }) => {
            const [currentMenu, setCurrentMenu] = useState('members'); 

            return (
                <div className="flex h-screen w-full bg-slate-100 overflow-hidden font-sans">
                    <aside className="w-20 lg:w-64 bg-slate-900 text-slate-300 flex flex-col transition-all duration-300 shrink-0 shadow-xl z-30">
                        <div className="h-[84px] flex items-center px-8 border-b border-slate-800">
                            <Activity className="text-indigo-500 shrink-0" size={28} />
                            <span className="ml-2 text-[15px] font-black text-white hidden lg:block tracking-tight">TBC Serve Manager</span>
                        </div>
                        <nav className="flex-1 py-6 px-4 space-y-3">
                            <button onClick={() => setCurrentMenu('members')} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl font-bold transition-all ${currentMenu === 'members' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800 text-slate-400'}`}>
                                <Users size={22} />
                                <span className="hidden lg:block text-sm">同工資料中心</span>
                            </button>
                            <button onClick={() => setCurrentMenu('scheduling')} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl font-bold transition-all ${currentMenu === 'scheduling' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800 text-slate-400'}`}>
                                <Calendar size={22} />
                                <span className="hidden lg:block text-sm">排班作業中心</span>
                            </button>
                        </nav>
                        <div className="p-4 border-t border-slate-800">
                            <button onClick={() => supabase.auth.signOut()} className="w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-slate-400 hover:bg-red-500/10 hover:text-red-400 transition-all">
                                <LogOut size={20} />
                                <span className="hidden lg:block text-sm">登出系統</span>
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-full overflow-hidden bg-slate-50 z-10">
                        {currentMenu === 'members' && <MemberDataCenter session={session} />}
                        {currentMenu === 'scheduling' && <SchedulingCenter />}
                    </main>
                </div>
            );
        }

        function App() {
            const [session, setSession] = useState(null);
            const [isLoaded, setIsLoaded] = useState(false);
            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => { setSession(session); setIsLoaded(true); });
                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => { setSession(session); });
                return () => subscription.unsubscribe();
            }, []);
            if (!isLoaded) return null;
            return session ? <MainApp session={session} /> : <AuthScreen supabase={supabase} />;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
